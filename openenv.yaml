name: openenv-agent
version: 1.0
description: A three-task LLM evaluation environment for Hugging Face Spaces.

entrypoint:
  url: https://huggingface.co/spaces/theepanss/openenv-agent

model:
  provider: openai-compatible
  name: ${MODEL_NAME}
  base_url: ${API_BASE_URL}

endpoints:
  reset:
    method: POST
    path: /reset

  step:
    method: POST
    path: /step

  state:
    method: GET
    path: /state

tasks:
  - id: task1
    observation_space: text
    action_space: integer
    grader: graders/grader1.py

  - id: task2
    observation_space: text
    action_space: integer
    grader: graders/grader2.py

  - id: task3
    observation_space: text
    action_space: integer
    grader: graders/grader3.py
